<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>8-bit Street Mobile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrap" tabindex="0">
    <div id="sky"></div>

    <div class="layer-wrap" id="far-wrap">
      <div class="layer-inner" id="far-inner"></div>
    </div>
    <div class="layer-wrap" id="mid-wrap">
      <div class="layer-inner" id="mid-inner"></div>
    </div>

    <div id="sidewalk">
      <div class="layer-inner" id="sw-inner"></div>
    </div>

    <div id="road">
      <div class="layer-inner" id="road-inner"></div>
    </div>

    <div class="layer-wrap" id="fg-wrap">
      <div class="layer-inner" id="fg-inner"></div>
    </div>

    <div id="character">
      <div id="char-head"></div>
      <div id="char-body"></div>
      <div id="char-legs">
        <div class="leg" id="leg-l"></div>
        <div class="leg" id="leg-r"></div>
      </div>
    </div>

    <div id="hud">← → ARROW KEYS TO WALK</div>

    <div id="touch-controls">
      <div class="touch-btn" id="btn-left">&#9664;</div>
      <div class="touch-btn" id="btn-right">&#9654;</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
